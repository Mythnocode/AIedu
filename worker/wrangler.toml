name = "exam-analyzer-worker"
main = "src/index.ts"
compatibility_date = "2026-07-02"
workers_dev = true

[vars]
DEEPSEEK_MODEL = "deepseek-v4-pro"
OPENAI_MODEL = "gpt-5.5"
GPT_API_BASE = "https://geekspace.cloud/v1"
ALLOWED_ORIGINS = "https://mythnocode.github.io,https://smartxh.asia,https://www.smartxh.asia,https://api.smartxh.asia,http://localhost:5500,http://127.0.0.1:5500,http://localhost:8000,http://127.0.0.1:8000"
BAIDU_OCR_MODE = "auto"

[[routes]]
pattern = "api.smartxh.asia"
custom_domain = true

[[routes]]
pattern = "ai.smartxh.asia"
custom_domain = true

[[d1_databases]]
binding = "DB"
database_name = "exam-analyzer-db"
database_id = "c5bf5074-6b93-45ea-8c58-4d51cb8625eb"
preview_database_id = "c5bf5074-6b93-45ea-8c58-4d51cb8625eb"
